{% extends "base.html" %}

{% block title %}Удаление комментария{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>Удаление комментария</h2>
            <p>Вы уверены, что хотите удалить этот комментарий?</p>
            <div class="card mb-3">
                <div class="card-body">
                    {{ comment.text|linebreaksbr }}
                </div>
            </div>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Удалить</button>
                <a href="{% url 'blog:post_detail' comment.post.id %}" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
